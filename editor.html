<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業指示編集 - SECPortalApp v4.0</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    /* 全体のベースフォントを綺麗にする微調整 */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f3f4f6; /* Tailwindのgray-100相当 */
    }
    /* スクロールバーを少しスマートに */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
  </style>
</head>
<body class="p-4 md:p-6">

<div id="app">
  <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden">
    
    <div class="bg-gray-800 text-white px-6 py-4 flex justify-between items-center border-b border-gray-700">
      <div class="flex items-center gap-3">
        <span class="text-xl">🛠️</span>
        <h2 class="text-lg font-bold tracking-wider font-sans">作業指示 編集・新規発行</h2>
      </div>
      <span class="text-xs bg-gray-700 px-3 py-1 rounded-full border border-gray-600 text-gray-300 font-mono">SECPortalApp v4.0 Engine</span>
    </div>

    <form @submit.prevent="saveData" class="p-6 bg-gray-50 space-y-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
          <h3 class="text-sm font-extrabold text-blue-600 flex items-center gap-1 border-b pb-2">
            <span>📋</span> 基本項目
          </h3>
          
          <div class="grid grid-cols-3 gap-3">
            <div class="col-span-2">
              <label class="block text-xs font-bold text-gray-700 mb-1">部署・グループ <span class="text-red-500">*</span></label>
              <select v-model="formData.department" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all">
                <option v-for="dept in departments" :key="dept" :value="dept">{{ dept }}</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">優先順</label>
              <input type="number" v-model="formData.priority" placeholder="-" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm text-center bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">整理No. <span class="text-red-500">*</span></label>
              <input type="text" v-model="formData.seiriNo" placeholder="例: 260601" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm font-mono bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">出 (出力・型式)</label>
              <input type="text" v-model="formData.output" placeholder="例: 75kW" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">顧客名 <span class="text-red-500">*</span></label>
            <input type="text" v-model="formData.customer" placeholder="顧客名を入力してください" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">次工程</label>
            <input type="text" v-model="formData.nextProcess" placeholder="例: 出荷試験 / 溶射皮膜剥離" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
          </div>
        </div>

        <div class="space-y-4 flex flex-col justify-between">
          
          <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4 flex-1">
            <h3 class="text-sm font-extrabold text-blue-600 flex items-center gap-1 border-b pb-2">
              <span>📝</span> 指示・引継ぎ詳細
            </h3>
            
            <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">作業内容</label>
              <textarea v-model="formData.workDetails" rows="3" placeholder="現場への具体的な作業指示を記入..." class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white resize-y transition-all"></textarea>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">備考 (引継ぎ・進捗状況等)</label>
              <textarea v-model="formData.notes" rows="3" placeholder="翌日のメンバーへの申し送り、または現在の進捗課題を記入..." class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white resize-y transition-all"></textarea>
            </div>
          </div>

          <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <label class="block text-xs font-bold text-gray-700 mb-2">🚥 進捗ステータス (完了確認)</label>
            <div class="grid grid-cols-4 gap-2">
              <button type="button" @click="setStatus('未着手')" 
                :class="formData.status === '未着手' ? 'bg-gray-600 text-white border-gray-600 shadow-inner' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-gray-200'"
                class="py-2.5 text-xs font-bold rounded-lg border-2 transition-all text-center">未着手</button>
              
              <button type="button" @click="setStatus('作業中')" 
                :class="formData.status === '作業中' ? 'bg-yellow-400 text-yellow-900 border-yellow-500 shadow-inner' : 'bg-white text-gray-700 border-gray-200 hover:bg-yellow-50 hover:border-yellow-300'"
                class="py-2.5 text-xs font-bold rounded-lg border-2 transition-all text-center">作業中</button>
              
              <button type="button" @click="setStatus('完了')" 
                :class="formData.status === '完了' ? 'bg-green-600 text-white border-green-700 shadow-inner' : 'bg-white text-gray-700 border-gray-200 hover:bg-green-50 hover:border-green-400'"
                class="py-2.5 text-xs font-bold rounded-lg border-2 transition-all text-center">完了</button>
              
              <button type="button" @click="setStatus('繰越')" 
                :class="formData.status === '繰越' ? 'bg-orange-500 text-white border-orange-600 shadow-inner' : 'bg-white text-gray-700 border-gray-200 hover:bg-orange-50 hover:border-orange-300'"
                class="py-2.5 text-xs font-bold rounded-lg border-2 transition-all text-center">繰越</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center border-b pb-2 mb-3">
          <h3 class="text-sm font-extrabold text-blue-600 flex items-center gap-1">
            <span>👥</span> 担当者アサイン
          </h3>
          <span class="text-[10px] font-extrabold text-green-700 bg-green-50 border border-green-200 px-2 py-0.5 rounded-full">本日出勤者リスト連動</span>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div>
            <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">主担当 (工程責任)</span>
            <select v-model="formData.mainTanto" class="w-full p-2.5 border-2 border-blue-200 rounded-lg text-sm bg-blue-50 font-bold text-blue-800 focus:bg-white transition-all">
              <option value="">- 未配置 -</option>
              <option v-for="staff in staffList" :key="staff" :value="staff">{{ staff }}</option>
            </select>
          </div>
          <div>
            <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">副担当</span>
            <select v-model="formData.subTanto" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white transition-all">
              <option value="">- 未配置 -</option>
              <option v-for="staff in staffList" :key="staff" :value="staff">{{ staff }}</option>
            </select>
          </div>
          <div>
            <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">担1</span>
            <select v-model="formData.tan1" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white transition-all">
              <option value="">- 未配置 -</option>
              <option v-for="staff in staffList" :key="staff" :value="staff">{{ staff }}</option>
            </select>
          </div>
          <div>
            <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">担2</span>
            <select v-model="formData.tan2" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white transition-all">
              <option value="">- 未配置 -</option>
              <option v-for="staff in staffList" :key="staff" :value="staff">{{ staff }}</option>
            </select>
          </div>
        </div>
      </div>

      <div class="flex justify-between items-center pt-2 border-t border-gray-200">
        <span class="text-xs text-gray-400 font-mono hidden md:inline-block">Status: {{ formData.status }} | No: {{ formData.seiriNo || '---' }}</span>
        
        <div class="flex gap-3 w-full justify-end">
          <button type="button" @click="cancelEdit" class="px-6 py-2.5 text-sm font-bold bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-all">
            キャンセル
          </button>
          <button type="submit" class="px-8 py-2.5 text-sm font-bold bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md shadow-blue-200 transition-all flex items-center gap-2">
            <span>💾</span> <span>指示書を保存</span>
          </button>
        </div>
      </div>

    </form>
  </div>
</div>

<script>
  const { createApp, ref, onMounted } = Vue;

  createApp({
    setup() {
      // 📝 入力フォームのデータをすべてここで一括管理します
      const formData = ref({
        department: 'メンテ1課 (GrA)',
        priority: '',
        seiriNo: '',
        output: '',
        customer: '',
        nextProcess: '',
        workDetails: '',
        notes: '',
        status: '未着手',
        mainTanto: '永野',
        subTanto: '',
        tan1: '',
        tan2: ''
      });

      // 🛠 部署の選択肢マスター（のちにGASから取得可能）
      const departments = [
        '工場管理', 'メンテ1課 (GrA)', 'メンテ1課 (GrB)', 'メンテ1課 (GrC)',
        'メンテ2課', '巻線課', '技術・試験課'
      ];

      // 👥 担当者の選択肢マスター（のちにGASの出勤APIから取得可能）
      const staffList = [
        '永野', '田中', '峯', '稲山', '鈴木', '佐藤', '高橋'
      ];

      // 🚥 ステータスボタンを押したときの処理
      const setStatus = (newStatus) => {
        formData.value.status = newStatus;
      };

      // 💾 保存ボタンを押したときの処理（ここでGASのdoPostにデータを投げます）
      const saveData = () => {
        if (!formData.value.seiriNo || !formData.value.customer) {
          alert('🚨 整理Noと顧客名は必須です！');
          return;
        }

        // ここに将来、GAS(API)へデータをPOSTする処理を書きます。
        console.log('送信するデータ:', formData.value);
        alert('保存準備OK！\n整理No: ' + formData.value.seiriNo + '\n担当: ' + formData.value.mainTanto);
        
        // 成功したら一覧画面(index.html)に戻るなどの処理を入れます
        // window.location.href = 'index.html';
      };

      // ✖️ キャンセルボタン
      const cancelEdit = () => {
        if(confirm('編集を破棄して一覧に戻りますか？')) {
          // window.location.href = 'index.html';
          console.log('キャンセルされました');
        }
      };

      return {
        formData,
        departments,
        staffList,
        setStatus,
        saveData,
        cancelEdit
      };
    }
  }).mount('#app');
</script>

</body>
</html>
