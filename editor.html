<div class="max-w-5xl mx-auto bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden my-6">
  
  <div class="bg-gray-800 text-white px-6 py-4 flex justify-between items-center border-b border-gray-700">
    <div class="flex items-center gap-3">
      <span class="text-xl">🛠️</span>
      <h2 class="text-lg font-bold tracking-wider font-sans">作業指示 編集・新規発行</h2>
    </div>
    <span class="text-xs bg-gray-700 px-3 py-1 rounded-full border border-gray-600 text-gray-300 font-mono">SECPortalApp v4.0 Engine</span>
  </div>

  <form class="p-6 bg-gray-50 space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
        <h3 class="text-sm font-extrabold text-blue-600 flex items-center gap-1 border-b pb-2">
          <span>📋</span> 基本項目
        </h3>
        
        <div class="grid grid-cols-3 gap-3">
          <div class="col-span-2">
            <label class="block text-xs font-bold text-gray-700 mb-1">部署・グループ <span class="text-red-500">*</span></label>
            <select class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all">
              <option>メンテ1課 (GrA)</option>
              <option>メンテ1課 (GrB)</option>
              <option>メンテ2課</option>
              <option>巻線課</option>
              <option>技術・試験課</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">優先順</label>
            <input type="number" placeholder="-" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm text-center bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">整理No. <span class="text-red-500">*</span></label>
            <input type="text" placeholder="例: 260601" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm font-mono bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">出 (出力・型式)</label>
            <input type="text" placeholder="例: 75kW" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-700 mb-1">顧客名 <span class="text-red-500">*</span></label>
          <input type="text" placeholder="顧客名を入力してください" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-700 mb-1">次工程</label>
          <input type="text" placeholder="例: 出荷試験 / 溶射皮膜剥離" class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white transition-all">
        </div>
      </div>

      <div class="space-y-4 flex flex-col justify-between">
        
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4 flex-1">
          <h3 class="text-sm font-extrabold text-blue-600 flex items-center gap-1 border-b pb-2">
            <span>📝</span> 指示・引継ぎ詳細
          </h3>
          
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">作業内容</label>
            <textarea rows="3" placeholder="現場への具体的な作業指示を記入..." class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white resize-y transition-all"></textarea>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">備考 (引継ぎ・進捗状況等)</label>
            <textarea rows="3" placeholder="翌日のメンバーへの申し送り、または現在の進捗課題を記入..." class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:border-blue-500 focus:bg-white resize-y transition-all"></textarea>
          </div>
        </div>

        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
          <label class="block text-xs font-bold text-gray-700 mb-2">🚥 進捗ステータス (完了確認)</label>
          <div class="grid grid-cols-4 gap-2">
            <button type="button" class="py-2.5 text-xs font-bold rounded-lg border-2 border-gray-300 bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all text-center">未着手</button>
            <button type="button" class="py-2.5 text-xs font-bold rounded-lg border-2 border-yellow-400 bg-yellow-50 text-yellow-700 hover:bg-yellow-100 ring-2 ring-yellow-200 transition-all text-center">作業中</button>
            <button type="button" class="py-2.5 text-xs font-bold rounded-lg border-2 border-gray-200 bg-white text-gray-700 hover:bg-green-50 hover:border-green-500 hover:text-green-700 transition-all text-center">完了</button>
            <button type="button" class="py-2.5 text-xs font-bold rounded-lg border-2 border-gray-200 bg-white text-gray-700 hover:bg-orange-50 hover:border-orange-400 hover:text-orange-700 transition-all text-center">繰越</button>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
      <div class="flex justify-between items-center border-b pb-2 mb-3">
        <h3 class="text-sm font-extrabold text-blue-600 flex items-center gap-1">
          <span>👥</span> 担当者アサイン
        </h3>
        <span class="text-[10px] font-extrabold text-green-700 bg-green-50 border border-green-200 px-2 py-0.5 rounded-full">本日出勤者のみ自動連動</span>
      </div>
      
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div>
          <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">主担当 (工程責任)</span>
          <select class="w-full p-2.5 border-2 border-blue-200 rounded-lg text-sm bg-blue-50 font-bold text-blue-800 focus:bg-white transition-all">
            <option>永野 (出勤)</option>
            <option>田中 (出勤)</option>
            <option>峯 (出勤)</option>
          </select>
        </div>
        <div>
          <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">副担当</span>
          <select class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white transition-all">
            <option value="">- 未配置 -</option>
            <option>田中</option>
            <option>峯</option>
          </select>
        </div>
        <div>
          <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">担1</span>
          <select class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white transition-all">
            <option value="">- 未配置 -</option>
            <option>鈴木</option>
            <option>佐藤</option>
          </select>
        </div>
        <div>
          <span class="block text-[10px] uppercase font-black text-gray-400 mb-1">担2</span>
          <select class="w-full p-2.5 border-2 border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white transition-all">
            <option value="">- 未配置 -</option>
            <option>鈴木</option>
            <option>佐藤</option>
          </select>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-2 border-t border-gray-200">
      <button type="button" class="px-6 py-2.5 text-sm font-bold bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-all">
        キャンセル
      </button>
      <button type="submit" class="px-8 py-2.5 text-sm font-bold bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md shadow-blue-200 transition-all flex items-center gap-2">
        <span>💾</span> <span>指示書を保存 (スプシ即時上書き)</span>
      </button>
    </div>

  </form>
</div>
