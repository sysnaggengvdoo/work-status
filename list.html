<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>作業指示書（全体一覧）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f3f4f6; 
            margin: 0; 
            color: #333; 
            padding-bottom: 70px; 
            /* ★変更: 横スクロールを完全に禁止しない（全体を縮小表示するため） */
        }
        
        .header-container { 
            background-color: #1d4ed8; 
            color: white; 
            padding: 12px 16px; 
            /* ★変更: スケールが変わるとstickyがおかしくなることがあるため、必要に応じて外すか調整 */
            position: sticky; 
            top: 0; 
            z-index: 100; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        .header-container h1 { font-size: 1.25rem; font-weight: bold; margin: 0; }
        
        .search-box { display: flex; gap: 8px; width: 50%; max-width: 400px; }
        .search-box input { flex: 1; padding: 8px 12px; font-size: 0.95em; border-radius: 6px; border: none; color: black; outline: none; }
        
        .refresh-btn { padding: 8px 16px; background-color: #22c55e; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: background-color 0.2s; }
        .refresh-btn:hover { background-color: #16a34a; }

        /* ★変更: main-content の padding を少し減らす */
        .main-content { padding: 8px; margin: 0 auto; max-width: 100%; }

        /* スプシ風テーブルのデザイン */
        .table-container {
            /* ★変更: テーブル自体ではなく、画面全体でスクロール・ズームさせる */
            overflow: visible; 
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        table {
            /* ★変更: 画面幅に強制的に収める設定 */
            width: 100%;
            table-layout: fixed; /* 列幅を均等（または指定幅）に固定 */
            border-collapse: collapse; /* 枠線を細くする */
            font-size: 12px; /* ★変更: 全体が入るように基準フォントサイズを小さく */
        }
        th, td {
            border: 1px solid #e5e7eb;
            padding: 6px 4px; /* ★変更: 余白を極力減らす */
            text-align: left;
            /* ★変更: 文字が溢れたら改行して、何が何でも列幅内に収める */
            white-space: normal; 
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        th {
            background-color: #f3f4f6;
            font-weight: bold;
            color: #374151;
            /* ★変更: stickyを解除（ズーム時に挙動がおかしくなるのを防ぐため） */
            position: static; 
        }
        tbody tr:hover {
            background-color: #f0fdf4;
        }
        
        /* ★列幅の割合指定（全10列が画面内に収まるように微調整） */
        th:nth-child(1) { width: 8%; }  /* 部署 */
        th:nth-child(2) { width: 5%; }  /* 順 */
        th:nth-child(3) { width: 12%; } /* 整理No. */
        th:nth-child(4) { width: 12%; } /* 顧客名 */
        th:nth-child(5) { width: 5%; }  /* 出 */
        th:nth-child(6) { width: 25%; } /* 作業内容（一番広く） */
        th:nth-child(7) { width: 10%; } /* 担当 */
        th:nth-child(8) { width: 8%; }  /* 完了確認 */
        th:nth-child(9) { width: 10%; } /* 備考 */
        th:nth-child(10) { width: 5%; } /* 修理カード */

        .status-badge {
            padding: 2px 4px; /* バッジも小さく */
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <h1>📋 全体一覧</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="検索..." oninput="renderData()">
            <button class="refresh-btn" onclick="refreshData()">🔄 更新</button>
        </div>
    </header>

    <main class="main-content">
        <div id="loading" style="text-align: center; padding: 40px; color: #4b5563; font-weight: bold;">
            <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-3"></div>
            データを読み込み中...
