<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>作業指示書（全体一覧）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            /* ★変更：日本語が美しく読みやすいフォント指定（ヒラギノ、メイリオ優先） */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif; 
            background-color: #f3f4f6; 
            margin: 0; 
            color: #333; 
            padding-bottom: 20px; 
            letter-spacing: 0.02em; /* 文字間隔を少し広げて視認性アップ */
        }
        
        .header-container { 
            background-color: #1d4ed8; 
            color: white; 
            padding: 8px 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }
        
        .header-container h1 { 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin: 0; 
            line-height: 1.2;
            white-space: nowrap; 
        }

        .subtitle {
            font-size: 0.7rem;
            color: #d1d5db; 
            white-space: nowrap;
            margin-top: 2px;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn { 
            padding: 6px 12px; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-decoration: none; 
            white-space: nowrap; 
            transition: all 0.2s; 
            border: 1px solid white;
            display: flex;
            align-items: center;
        }

        .refresh-btn {
            background-color: #22c55e;
            color: white;
        }
        .refresh-btn:hover {
            background-color: white;
            color: #16a34a;
            border-color: #16a34a;
        }

        .back-btn { 
            background-color: #3b82f6; 
            color: white; 
        }
        .back-btn:hover { 
            background-color: white; 
            color: #1d4ed8; 
            border-color: #1d4ed8;
        }

        .main-content { padding: 8px; margin: 0 auto; max-width: 100%; }

        .table-container {
            overflow: visible; 
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        
        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse; 
            font-size: 13px; /* ★変更：12pxだと少し小さいため13pxに拡大 */
        }
        
        th, td {
            border: 1px solid #e5e7eb;
            padding: 8px 4px; /* ★変更：上下の余白を少し広げて窮屈さを解消 */
            text-align: left;
            white-space: normal; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            vertical-align: middle;
        }
        
        th {
            background-color: #f3f4f6;
            font-weight: bold;
            color: #374151;
            position: static; 
            text-align: center; /* 見出しは中央揃えの方が見栄えが良いです */
        }

        /* ★追加：スプシ風のストライプ（互い違い）背景色 */
        tbody tr:nth-child(odd) {
            background-color: #ffffff; /* 奇数行は白 */
        }
        tbody tr:nth-child(even) {
            background-color: #f8fafc; /* 偶数行はごく薄い青みがかったグレー */
        }
        
        tbody tr:hover {
            background-color: #f0fdf4; /* ホバー時は薄い緑色 */
        }
        
        th:nth-child(1) { width: 8%; }
        th:nth-child(2) { width: 5%; }
        th:nth-child(3) { width: 12%; }
        th:nth-child(4) { width: 12%; }
        th:nth-child(5) { width: 5%; }
        th:nth-child(6) { width: 25%; }
        th:nth-child(7) { width: 10%; }
        th:nth-child(8) { width: 8%; }
        th:nth-child(9) { width: 10%; }
        th:nth-child(10) { width: 5%; }

        .status-badge {
            padding: 3px 4px; 
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="title-group">
            <h1>一覧（閲覧用）</h1>
            <span class="subtitle">※横向き推奨</span>
        </div>
        
        <div class="header-buttons">
            <button onclick="refreshData()" class="header-btn refresh-btn">🔄 更新</button>
            <a href="index.html" class="header-btn back-btn">🔙 カード表示</a>
        </div>
    </header>

    <main class="main-content">
        <div id="loading" style="text-align: center; padding: 40px; color: #4b5563; font-weight: bold;">
            <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-3"></div>
            データを読み込み中...
        </div>
        
        <div class="table-container" id="tableContainer" style="display: none;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>部署</th>
                        <th>順</th>
                        <th>整理No.</th>
                        <th>顧客名</th>
                        <th>出</th>
                        <th>作業内容</th>
                        <th>担当</th>
                        <th>状況</th>
                        <th>備考</th>
                        <th>URL</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
        <div id="noDataMessage" style="display: none; text-align:center; padding:30px; color:#6b7280; background:white; border-radius:8px; border:1px solid #e5e7eb;">表示するデータがありません</div>
    </main>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbwQqLYRy7JHH_orozMb9RF3fS_equHKdsImadg8MUHsVDPZ6E1f9yzgytqG2jqcxNAF/exec";
    
    const CACHE_KEY = "sec_portal_cache_v36"; 
    let globalData = [];

    function refreshData() {
        localStorage.removeItem(CACHE_KEY); 
        document.getElementById('tableContainer').style.display = 'none';
        document.getElementById('noDataMessage').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        loadData();
    }

    async function loadData() {
        const loadingEl = document.getElementById('loading');
        const cachedStr = localStorage.getItem(CACHE_KEY);

        if (cachedStr) {
            try {
                const cachedJSON = JSON.parse(cachedStr);
                globalData = cachedJSON.tasks || [];
                loadingEl.style.display = 'none';
                renderData();
            } catch (e) {
                loadingEl.style.display = 'block';
            }
        } else {
            loadingEl.style.display = 'block';
        }

        try {
            const response = await fetch(`${gasUrl}?_=${new Date().getTime()}`);
            const result = await response.json();
            
            globalData = result.tasks || [];
            localStorage.setItem(CACHE_KEY, JSON.stringify(result));
            
            loadingEl.style.display = 'none';
            renderData(); 
        } catch (error) {
            console.error("API通信エラー:", error);
            if (!cachedStr) {
                loadingEl.innerHTML = '<div style="color:red; font-weight:bold;">データの読み込みに失敗しました。</div>';
            }
        }
    }

    function renderData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        const filteredData = globalData.filter(row => row["ID"]);

        if (filteredData.length === 0) {
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'block';
            return;
        }

        document.getElementById('tableContainer').style.display = 'block';
        document.getElementById('noDataMessage').style.display = 'none';

        filteredData.forEach(row => {
            const tr = document.createElement('tr');
            
            let bgColor = "#f3f4f6"; 
            let textColor = "#374151";
            
            if (row["完了確認"] === "完了予定") {
                bgColor = "#fef08a"; 
                textColor = "#854d0e";
            } else if (row["完了確認"] === "完了" || row["完了確認"] === "繰越") {
                bgColor = "#9ca3af"; 
                textColor = "white";
            }

            let urlCell = row["修理カードURL"] 
                ? `<a href="${row["修理カードURL"]}" target="_blank" style="color: #2563eb; text-decoration: underline; font-weight: bold;">開く</a>` 
                : `<span style="color: #9ca3af;">-</span>`;

            tr.innerHTML = `
                <td>${row["部署"] || ""}</td>
                <td style="text-align: center;">${row["順"] || ""}</td>
                <td>${row["整理No."] || ""}</td>
                <td>${row["顧客名"] || ""}</td>
                <td>${row["出"] || ""}</td>
                <td>${row["作業内容"] || ""}</td>
                <td>${row["担当"] || ""}</td>
                <td><span class="status-badge" style="background-color: ${bgColor}; color: ${textColor};">${row["完了確認"] || "未着手"}</span></td>
                <td>${row["備考"] || ""}</td>
                <td style="text-align: center;">${urlCell}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
