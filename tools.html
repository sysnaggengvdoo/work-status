<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>業務ツール一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f3f4f6; color: #333; padding-bottom: 70px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    /* ツールボタンのデザイン */
    .tool-btn {
      background-color: white;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: all 0.2s;
      text-decoration: none;
      color: #333;
      border-left: 6px solid #3b82f6; /* 青いアクセント */
    }
    .tool-btn:active { transform: scale(0.98); }
    .tool-icon {
      font-size: 24px;
      color: #3b82f6;
      width: 50px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header class="bg-blue-800 text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="font-bold text-lg"><i class="fa-solid fa-toolbox mr-2"></i>業務ツール一覧</div>
  </header>

  <main id="menuView" class="p-4 max-w-lg mx-auto space-y-4 mt-4">
    
    <a href="vehicle.html" class="tool-btn">
      <div class="tool-icon"><i class="fa-solid fa-truck-ramp-box"></i></div>
      <div>
        <div class="font-bold text-lg">車両・駐車場管理</div>
        <div class="text-xs text-gray-500">出張や納品の車両スケジューラ</div>
      </div>
    </a>

    <button onclick="openCalc()" class="tool-btn w-full text-left">
      <div class="tool-icon"><i class="fa-solid fa-calculator"></i></div>
      <div>
        <div class="font-bold text-lg">技術計算ツール</div>
        <div class="text-xs text-gray-500">重量・インパルス・バランス等の計算</div>
      </div>
    </button>

    <a href="#" class="tool-btn opacity-50" onclick="alert('準備中です')">
      <div class="tool-icon"><i class="fa-solid fa-book"></i></div>
      <div>
        <div class="font-bold text-lg">社内マニュアル</div>
        <div class="text-xs text-gray-500">手順書や規定の確認</div>
      </div>
    </a>

  </main>

  <div id="calcView" style="display: none; height: calc(100vh - 130px);">
    <div class="bg-gray-200 p-2 text-sm flex justify-between items-center">
      <span class="font-bold text-gray-700">🧮 技術計算ツール</span>
      <button onclick="closeCalc()" class="bg-gray-400 text-white px-3 py-1 rounded text-xs hover:bg-gray-500"><i class="fa-solid fa-xmark"></i> 閉じる</button>
    </div>
    <iframe src="https://sysnaggengvdoo.github.io/eng-calc/" class="w-full h-full border-0"></iframe>
  </div>

  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around text-xs font-bold text-gray-500 z-40 pb-safe">
    <a href="index.html" class="flex flex-col items-center py-2 w-full hover:bg-blue-50 transition">
      <i class="fa-solid fa-list-check fa-lg mb-1"></i><span>当日作業</span>
    </a>
    <a href="past.html" class="flex flex-col items-center py-2 w-full hover:bg-blue-50 transition">
      <i class="fa-solid fa-magnifying-glass fa-lg mb-1"></i><span>過去検索</span>
    </a>
    <a href="#" class="flex flex-col items-center py-2 w-full text-blue-600 border-t-2 border-blue-600 bg-blue-50">
      <i class="fa-solid fa-toolbox fa-lg mb-1"></i><span>業務ツール</span>
    </a>
  </nav>

  <script>
    // 計算ツールを開く処理
    function openCalc() {
      document.getElementById('menuView').style.display = 'none';
      document.getElementById('calcView').style.display = 'block';
    }
    // 計算ツールを閉じてメニューに戻る処理
    function closeCalc() {
      document.getElementById('calcView').style.display = 'none';
      document.getElementById('menuView').style.display = 'block';
    }
  </script>
</body>
</html>
